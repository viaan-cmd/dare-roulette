<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dare Roulette 🎲</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --primary: #ff007f;
            --secondary: #7000ff;
            --accent: #00f0ff;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c1b 0%, #1a103c 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* --- WHEEL SECTION --- */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 10px;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--accent);
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #2a1b5c;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.4);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: var(--text);
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* --- CONTROLS & DISPLAY --- */
        .btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.4);
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(255, 0, 127, 0.7);
        }

        .btn:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        .dare-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            width: 100%;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .dare-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* --- CAMERA & VIDEO SECTION --- */
        .camera-section {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--secondary);
            background: #000;
            aspect-ratio: 4/3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recording-dot {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 15px;
            height: 15px;
            background-color: red;
            border-radius: 50%;
            animation: blink 1s infinite;
            display: none;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .action-btns {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .action-btns .btn {
            flex: 1;
            padding: 12px 10px;
            font-size: 0.9rem;
        }

        .btn-record { background: #ff3333; box-shadow: 0 4px 15px rgba(255,51,51,0.4); }
        .btn-stop { background: #333; }
        .btn-share { background: #00e676; box-shadow: 0 4px 15px rgba(0,230,118,0.4); }

        /* --- INTENSITY SELECTOR --- */
        .intensity-selector {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .intensity-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .intensity-btn.active {
            background: var(--secondary);
            border-color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <h1>Dare Roulette 🎲</h1>
    </header>

    <div class="container">
        
        <!-- Difficulty/Intensity Filter -->
        <div class="intensity-selector">
            <button class="intensity-btn active" onclick="setMode('chill', this)">Chill</button>
            <button class="intensity-btn" onclick="setMode('wild', this)">Wild</button>
            <button class="intensity-btn" onclick="setMode('extreme', this)">Extreme</button>
        </div>

        <!-- Roulette Wheel -->
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel-center"></div>
            <canvas id="wheelCanvas" width="300" height="300" class="wheel"></canvas>
        </div>

        <button id="spinBtn" class="btn" onclick="spinWheel()">Spin the Wheel</button>

        <!-- Dare Outcome Display -->
        <div class="dare-box">
            <div id="dareDisplay" class="dare-text">Press Spin to get a Dare! 🤔</div>
        </div>

        <!-- Built-in Proof Recorder -->
        <div id="cameraSection" class="camera-section">
            <h3 style="margin:0; color: var(--accent);">🎥 Capture Your Proof</h3>
            <div class="video-wrapper">
                <div id="recordDot" class="recording-dot"></div>
                <video id="preview" autoplay muted playsinline></video>
                <video id="playback" style="display:none;" controls></video>
            </div>
            
            <div style="width:100%">
                <div class="action-btns">
                    <button id="startRecBtn" class="btn btn-record" onclick="startRecording()">Record</button>
                    <button id="stopRecBtn" class="btn btn-stop" onclick="stopRecording()" disabled>Stop</button>
                    <button id="shareBtn" class="btn btn-share" onclick="shareToGroup()">Send to Group</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data banks used to mix and match items for infinite variations
        const dynamicMixins = {
            crushes: ["your crush", "your number one contact", "the 3rd person in your recents", "the last person you texted"],
            emojis: ["🍍", "👽", "🌮", "🦩", "🤡", "🧻", "🦖", "🫒"],
            accents: ["British", "French", "Southern pirate", "robot", "cowboy", "Valley girl", "opera singer"],
            objects: ["a pillow", "a spoon", "the nearest wall", "your phone charger", "a shoe", "a doorknob", "a chair leg"],
            liquids: ["hot sauce", "milk", "soy sauce", "pickle juice", "vinegar", "lemon juice", "mustard"],
            bodyParts: ["your left elbow", "your nose", "your forehead", "your chin", "your knee"],
            shouts: ["I AM THE LIZARD KING!", "WINTER IS COMING!", "LOOK AT THIS PHOTOGRAPH!", "PEANUT BUTTER IS A FLUID!"],
            times: ["30 seconds", "45 seconds", "1 minute", "2 minutes"]
        };

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // Blueprint configurations that morph dynamically into hundreds of unique dares
        const dareTemplates = {
            chill: [
                () => `Text ${getRandomItem(dynamicMixins.crushes)} just the word '${getRandomItem(dynamicMixins.emojis)}' and do not reply or explain.`,
                () => `Do 20 jumping jacks while loudly singing a song chosen by the group.`,
                () => `Let the group talk for ${getRandomItem(dynamicMixins.times)} using absolutely nothing but emojis.`,
                () => `Speak in a ${getRandomItem(dynamicMixins.accents)} accent for the next ${getRandomItem(dynamicMixins.times)}.`,
                () => `Call a random contact and passionately sing 'Happy Birthday' completely out of tune, then instantly hang up.`,
                () => `Balance ${getRandomItem(dynamicMixins.objects)} on your ${getRandomItem(dynamicMixins.bodyParts)} for ${getRandomItem(dynamicMixins.times)} without letting it drop.`,
                () => `Let the person to your left post any word or emoji to your social status right now.`,
                () => `Do your best impression of ${getRandomItem(dynamicMixins.crushes)} until your next turn.`,
                () => `Stare at ${getRandomItem(dynamicMixins.objects)} intently and whisper secrets to it for ${getRandomItem(dynamicMixins.times)}.`,
                () => `Text someone random: 'The drop is complete. Do not contact me again.'`,
                () => `Drink a full glass of water without using your hands at all.`,
                () => `Try to make yourself sneeze or fake a massive dramatic yawn for ${getRandomItem(dynamicMixins.times)}.`
            ],
            wild: [
                () => `Smell the ${getRandomItem(dynamicMixins.objects)} and review its scent profile dramatically like a professional chef.`,
                () => `Let a friend scroll through your photo camera roll for exactly ${getRandomItem(dynamicMixins.times)}.`,
                () => `Post a terribly scrambled, unflattering facial selfie to your story right now with zero context.`,
                () => `Mix ${getRandomItem(dynamicMixins.liquids)} and ${getRandomItem(dynamicMixins.liquids)} together into a spoon and take it like a shot.`,
                () => `Put an ice cube directly down your shirt and leave it there for ${getRandomItem(dynamicMixins.times)}.`,
                () => `Let the group completely restyle your hair using water, hair clips, or a comb into something ridiculous.`,
                () => `Serenade ${getRandomItem(dynamicMixins.objects)} with a 1-minute heartfelt, dramatic romantic love ballad.`,
                () => `Blindfold yourself and try to guess what 2 objects from the room the group places in your hands.`,
                () => `Plank on the floor for ${getRandomItem(dynamicMixins.times)} while reciting facts about your favorite animal.`,
                () => `Let the group write a funny caption and post it under your oldest available photo.`,
                () => `Put your socks on your hands and try to unlock your phone using only your knuckles.`
            ],
            extreme: [
                () => `Call a random restaurant or store and try to break up with whoever answers the phone.`,
                () => `Let the group construct a message and text it to ${getRandomItem(dynamicMixins.crushes)}. No take-backs!`,
                () => `Eat a raw sliver of onion, a slice of garlic, or a heavy spoonful of pure ${getRandomItem(dynamicMixins.liquids)}.`,
                () => `Go out a window or doorway and yell "${getRandomItem(dynamicMixins.shouts)}" at the absolute top of your lungs.`,
                () => `Gently crack a fresh raw egg straight over your head or hand it to a friend to do it for you.`,
                () => `Hand your completely unlocked phone over to the group entirely for the next two rounds of the game.`,
                () => `Let the group select one minor article of your clothing to get sprayed or soaked completely with cold water.`,
                () => `Apply a random cosmetic item (lipstick, marker, etc.) chosen by the group all over your face without looking in a mirror.`,
                () => `Let the group read the last 5 direct messages you received on your favorite social app out loud.`,
                () => `Call a contact chosen by the group and tell them you are converting your bedroom into a giant indoor swamp.`
            ]
        };

        let activePools = { chill: [], wild: [], extreme: [] };
        let currentMode = 'chill';
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let currentRotation = 0;
        let isSpinning = false;
        let readyShareFile = null;

        function shuffleDeck(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Generate a fresh set of completely dynamic dares from templates
        function initializePool(category) {
            let generatedDares = [];
            // Run each blueprint generator function multiple times to expand the base deck into hundreds of possibilities
            for (let loop = 0; loop < 25; loop++) {
                dareTemplates[category].forEach(generatorFunc => {
                    generatedDares.push(generatorFunc());
                });
            }
            // Shuffle them completely so repetitions never happen side-by-side
            activePools[category] = shuffleDeck([...new Set(generatedDares)]);
        }

        function drawWheel() {
            // Display 8 mock wedges visually to keep the spinning wheel animation super clean
            const numSegments = 8;
            const anglePerSegment = (2 * Math.PI) / numSegments;
            const colors = ['#ff007f', '#7000ff', '#1a103c', '#00f0ff', '#330066'];

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, i * anglePerSegment, (i + 1) * anglePerSegment);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#2a1b5c';
                ctx.stroke();

                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(i * anglePerSegment + anglePerSegment / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText(`⚡`, 120, 5);
                ctx.restore();
            }
        }

        function setMode(mode, btnElement) {
            if (isSpinning) return;
            currentMode = mode;
            document.querySelectorAll('.intensity-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            if (!activePools[currentMode] || activePools[currentMode].length === 0) {
                initializePool(currentMode);
            }
            drawWheel();
        }

        function spinWheel() {
            if (isSpinning) return;
            
            if (!activePools[currentMode] || activePools[currentMode].length < 2) {
                initializePool(currentMode);
            }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('dareDisplay').innerText = "Selecting your fate... 🔄";
            document.getElementById('cameraSection').style.display = 'none';

            const pool = activePools[currentMode];
            const fakeSegments = 8;
            const segmentAngle = 360 / fakeSegments;
            const chosenVisualWedge = Math.floor(Math.random() * fakeSegments);
            
            const targetAngle = 270 - (chosenVisualWedge * segmentAngle) - (segmentAngle / 2);
            const extraSpins = 5 * 360; 
            currentRotation += extraSpins + (targetAngle - (currentRotation % 360));

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                
                // Pull out the top dynamic dare item completely so it can never repeat
                const finalDare = pool.splice(0, 1)[0];
                document.getElementById('dareDisplay').innerText = finalDare;
                
                drawWheel();
                initCamera(); 
            }, 4000);
        }

        let mediaRecorder;
        let recordedChunks = [];
        let stream;

        async function initCamera() {
            document.getElementById('cameraSection').style.display = 'flex';
            document.getElementById('preview').style.display = 'block';
            document.getElementById('playback').style.display = 'none';
            document.getElementById('shareBtn').disabled = true;
            readyShareFile = null;

            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                document.getElementById('preview').srcObject = stream;
            } catch (err) {
                console.error("Camera setup failed", err);
                alert("Please unlock camera settings to capture proof videos!");
            }
        }

        function startRecording() {
            recordedChunks = [];
            let options = { mimeType: 'video/webm' };
            if (!MediaRecorder.isTypeSupported('video/webm')) {
                options = { mimeType: 'video/mp4' }; 
            }
            
            mediaRecorder = new MediaRecorder(stream, options);
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const mimeType = mediaRecorder.mimeType || 'video/webm';
                const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
                const blob = new Blob(recordedChunks, { type: mimeType });
                
                const videoURL = URL.createObjectURL(blob);
                const playback = document.getElementById('playback');
                playback.src = videoURL;
                document.getElementById('preview').style.display = 'none';
                playback.style.display = 'block';
                
                try {
                    readyShareFile = new File([blob], `dare_proof.${extension}`, { type: mimeType });
                    document.getElementById('shareBtn').disabled = false;
                } catch (e) {
                    console.error("Error staging the share file", e);
                }
            };

            mediaRecorder.start();
            document.getElementById('recordDot').style.display = 'block';
            document.getElementById('startRecBtn').disabled = true;
            document.getElementById('stopRecBtn').disabled = false;
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('recordDot').style.display = 'none';
            document.getElementById('startRecBtn').disabled = false;
            document.getElementById('stopRecBtn').disabled = true;
        }

        function shareToGroup() {
            if (!readyShareFile) {
                alert("No video recorded or processed yet!");
                return;
            }

            if (navigator.share && navigator.canShare && navigator.canShare({ files: [readyShareFile] })) {
                navigator.share({
                    files: [readyShareFile],
                    title: 'Dare Roulette Proof!',
                    text: `I just completed this dare: "${document.getElementById('dareDisplay').innerText}"`
                })
                .then(() => console.log("Successful share!"))
                .catch((err) => {
                    console.log("Share sheet exited:", err.message);
                });
            } else {
                const url = URL.createObjectURL(readyShareFile);
                const a = document.createElement('a');
                a.href = url;
                a.download = readyShareFile.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                alert("📥 Native sharing isn't fully supported on this device's current browser, so we downloaded it directly to your camera roll/files. Just attach it right to your group!");
            }
        }

        initializePool('chill');
        drawWheel();
    </script>
</body>
</html>
